<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="joystick" class="joystick">
        <div class="joystick-bg">
            <div class="joystick-stick"></div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="score-display">Score: <span id="score">0</span></div>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="320" height="320"></canvas>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-play">▶️ PLAY</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>⏸️ PAUSE</button>
            <button id="restartBtn" class="btn btn-restart">🔄 NEW</button>
        </div>

        <div class="difficulty-selector">
            <button class="diff-btn" data-difficulty="easy">Easy</button>
            <button class="diff-btn active" data-difficulty="normal">Normal</button>
            <button class="diff-btn" data-difficulty="hard">Hard</button>
        </div>

        <div id="settingsPanel" class="settings-modal" style="display: none;">
            <div class="settings-content">
                <div class="settings-close" onclick="toggleSettings()">✕</div>

                <div class="setting-group">
                    <h4>Touch Sensitivity</h4>
                    <div class="setting-buttons">
                        <button class="setting-btn" data-sensitivity="20">High</button>
                        <button class="setting-btn active" data-sensitivity="30">Normal</button>
                        <button class="setting-btn" data-sensitivity="50">Low</button>
                    </div>
                </div>

                <div class="setting-group">
                    <h4>Theme</h4>
                    <div class="setting-buttons">
                        <button class="setting-btn" data-theme="classic">Classic</button>
                        <button class="setting-btn" data-theme="neon">Neon</button>
                        <button class="setting-btn" data-theme="retro">Retro</button>
                        <button class="setting-btn" data-theme="dark">Dark</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="gameOver" class="game-over" style="display: none;">
            <div class="game-over-content">
                <h2>Game Over</h2>
                <p class="final-score">Score: <span id="finalScore">0</span></p>
                <button class="btn btn-play" onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="game.js"></script>
    <script src="renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
